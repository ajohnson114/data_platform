services:
  # -------------------------
  # Postgres DB (Dagster metadata)
  # -------------------------
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # -------------------------
  # DuckDB IO Manager
  # -------------------------
  io_manager:
    build:
      context: ./dockerfiles
      dockerfile: duckdb_io_manager.dockerfile
    volumes:
      - duckdb_data:/duckdb_io_manager

  # -------------------------
  # Code location: basic ML
  # -------------------------
  code_location_basic_ml:
    build:
      context: ../code_locations
      dockerfile: ../deployment/dockerfiles/ml_pipeline.dockerfile
    environment:
      ENV: ${ENV:-dev}
      DAGSTER_GRPC_PORT: 4000
      DAGSTER_GRPC_HOST: 0.0.0.0
      IO_MANAGER_PATH: /duckdb_io_manager/my_data.duckdb
      DAGSTER_HOME: /dagster_home
    volumes:
      - duckdb_data:/duckdb_io_manager
      - dagster_home:/dagster_home
      - dagster_compute_logs:/dagster_compute_logs
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - io_manager

  # -------------------------
  # Code location: ETL
  # -------------------------
  code_location_etl:
    build:
      context: ../code_locations
      dockerfile: ../deployment/dockerfiles/etl_pipeline.dockerfile
    environment:
      ENV: ${ENV:-dev}
      DAGSTER_GRPC_PORT: 4001
      DAGSTER_GRPC_HOST: 0.0.0.0
      IO_MANAGER_PATH: /duckdb_io_manager/my_data.duckdb
      DAGSTER_HOME: /dagster_home
    volumes:
      - duckdb_data:/duckdb_io_manager
      - dagster_home:/dagster_home
      - dagster_compute_logs:/dagster_compute_logs
    ports:
      - "4001:4001"
    depends_on:
      - postgres
      - io_manager

  # -------------------------
  # Kafka (KRaft mode, no Zookeeper)
  # -------------------------
  kafka:
    image: apache/kafka:3.8.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"

  # -------------------------
  # Kafka producer (CoinGecko -> Kafka)
  # -------------------------
  kafka_producer:
    build:
      context: ..
      dockerfile: deployment/dockerfiles/kafka_producer.dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: financial_data
      POLL_INTERVAL_SECONDS: "30"
    depends_on:
      - kafka
    restart: on-failure

  # -------------------------
  # PySpark consumer (Kafka -> DuckDB)
  # -------------------------
  spark_consumer:
    build:
      context: ..
      dockerfile: deployment/dockerfiles/spark_consumer.dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: financial_data
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: dagster
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_TABLE: crypto_prices
      CHECKPOINT_DIR: /tmp/spark_checkpoints/crypto_prices
    depends_on:
      - kafka
      - postgres
    mem_limit: 2g
    cpus: "1.5"

  # -------------------------
  # Dagster Webserver
  # -------------------------
  web:
    build:
      context: ..
      dockerfile: deployment/dockerfiles/webserver.dockerfile
    environment:
      DAGSTER_HOME: /dagster_home
      ENV: dev
    volumes:
      - dagster_home:/dagster_home   # ephemeral, container-managed
      - dagster_compute_logs:/dagster_compute_logs
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - code_location_basic_ml
      - code_location_etl

  daemon:
    build:
      context: ..
      dockerfile: deployment/dockerfiles/daemon.dockerfile
    environment:
      DAGSTER_HOME: /dagster_home
      ENV: dev
    volumes:
      - dagster_home:/dagster_home
      - dagster_compute_logs:/dagster_compute_logs
    depends_on:
      - postgres
      - code_location_basic_ml
      - code_location_etl

volumes:
  dagster_home: {}          # ephemeral
  dagster_compute_logs: {}  # ephemeral
  postgres_data: {}         # persistent Postgres metadata
  duckdb_data: {}           # ephemeral DuckDB IO manager